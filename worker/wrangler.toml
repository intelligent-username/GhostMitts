name = "ghostmitts-worker"
main = "src/index.ts"
compatibility_date = "2026-03-12"

# Deploy to *.workers.dev by default. Add `routes` only when you have a custom domain.
workers_dev = true

compatibility_flags = ["nodejs_compat"]

# Custom domain routing (optional)
# Uncomment + fill in when you're ready to bind a custom domain.
# routes = [
# 	{ pattern = "api.example.com/*", zone_name = "example.com" }
# ]

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "ghostmitts-combo-history"

[vars]
# Comma-separated browser origins that may call your API (CORS allowlist)
# Example: "http://localhost:3000,https://your-frontend.com"
# Remove these local things later.
# If left empty, the Worker will only allow localhost origins (safe default).
ALLOWED_ORIGINS = "https://pads.varak.dev, http://localhost:3000,http://127.0.0.1:3000"

# Secrets (set via `wrangler secret put ...`):
# - TURSO_DATABASE_URL
# - TURSO_AUTH_TOKEN
# - SESSION_SECRET
